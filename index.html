<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FlowE">
    <title>FlowE</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
    <link rel="icon" href="./assets/icon-192.png" sizes="192x192" type="image/png">
    <link rel="stylesheet" href="./styles.css">
    <script defer src="./assets/lucide.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="#materials" data-nav="materials" aria-label="FlowE 素材包">
          <img src="./assets/app-logo.png" alt="" class="brand-mark">
          <span>FlowE</span>
        </a>

        <nav class="nav compact-nav" aria-label="主导航">
          <button class="nav-button is-active" type="button" data-nav="materials">
            <i data-lucide="headphones"></i>
            <span>素材包</span>
          </button>
          <button class="nav-button" type="button" data-nav="chunks">
            <i data-lucide="library"></i>
            <span>词伙库</span>
          </button>
          <button class="nav-button" type="button" data-nav="mistakes">
            <i data-lucide="rotate-ccw"></i>
            <span>错题本</span>
          </button>
        </nav>

        <div class="top-actions">
          <button class="icon-button" type="button" id="exportButton" aria-label="导出数据" title="导出数据">
            <i data-lucide="download"></i>
          </button>
          <label class="icon-button file-action" aria-label="导入备份" title="导入备份">
            <i data-lucide="upload"></i>
            <input id="backupInput" type="file" accept="application/json">
          </label>
        </div>
      </header>

      <main>
        <section class="view is-active" data-view="materials" aria-labelledby="materialsTitle">
          <div class="page-heading">
            <div>
              <p class="eyebrow">Listen · Capture · Use</p>
              <h1 id="materialsTitle">素材包</h1>
            </div>
            <div class="stat-strip" aria-label="学习数据">
              <span><strong id="materialCount">0</strong> 素材</span>
              <span><strong id="chunkCount">0</strong> 词伙</span>
              <span><strong id="mistakeCount">0</strong> 错题</span>
            </div>
          </div>

          <div class="workspace-grid flow-layout">
            <aside class="list-panel material-sidebar">
              <div class="panel-title">
                <div>
                  <p class="section-label">Library</p>
                  <h2>我的素材</h2>
                </div>
              </div>
              <div id="materialsList" class="item-list"></div>

              <details class="import-drawer">
                <summary>
                  <i data-lucide="folder-plus"></i>
                  <span>导入新素材</span>
                </summary>
                <form id="materialForm" class="form-stack">
                  <label>
                    <span>标题</span>
                    <input id="materialTitle" type="text" placeholder="例如：AI podcast episode 01" required>
                  </label>
                  <label>
                    <span>来源链接</span>
                    <input id="materialSource" type="url" placeholder="https://...">
                  </label>
                  <label>
                    <span>音频文件</span>
                    <input id="audioInput" type="file" accept="audio/*">
                  </label>
                  <label>
                    <span>字幕 / 文稿文件</span>
                    <input id="transcriptInput" type="file" accept=".txt,.srt,.vtt,text/plain,text/vtt">
                  </label>
                  <label>
                    <span>Transcript</span>
                    <textarea id="transcriptText" rows="6" placeholder="粘贴 transcript，或上传 .txt / .srt / .vtt 文件"></textarea>
                  </label>
                  <button class="primary-button" type="submit">
                    <i data-lucide="save"></i>
                    <span>保存素材</span>
                  </button>
                </form>
              </details>
            </aside>

            <section class="detail-panel material-workbench">
              <div id="materialDetail" class="detail-empty"></div>
            </section>
          </div>
        </section>

        <section class="view" data-view="chunks" aria-labelledby="chunksTitle">
          <div class="page-heading">
            <div>
              <p class="eyebrow">Saved Expressions</p>
              <h1 id="chunksTitle">词伙库</h1>
            </div>
            <select id="chunkFilter" class="compact-select" aria-label="筛选词伙">
              <option value="all">全部</option>
              <option value="口语">口语</option>
              <option value="听力高频">听力高频</option>
              <option value="学术">学术</option>
              <option value="工作">工作</option>
              <option value="逻辑连接">逻辑连接</option>
              <option value="我老用错">我老用错</option>
            </select>
          </div>

          <section class="list-panel wide">
            <div id="chunksList" class="chunk-list"></div>
          </section>
        </section>

        <section class="view" data-view="mistakes" aria-labelledby="mistakesTitle">
          <div class="page-heading">
            <div>
              <p class="eyebrow">Review Later</p>
              <h1 id="mistakesTitle">错题本</h1>
            </div>
            <button class="secondary-button" type="button" id="clearCompletedButton">
              <i data-lucide="archive"></i>
              <span>归档已掌握</span>
            </button>
          </div>

          <section class="list-panel wide">
            <div class="panel-title">
              <div>
                <p class="section-label">Patterns</p>
                <h2>常错点</h2>
              </div>
              <select id="mistakeFilter" class="compact-select" aria-label="筛选错题">
                <option value="all">全部</option>
                <option value="语法">语法</option>
                <option value="搭配">搭配</option>
                <option value="听力">听力</option>
                <option value="表达升级">表达升级</option>
              </select>
            </div>
            <div id="mistakesList" class="mistake-list"></div>
          </section>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
